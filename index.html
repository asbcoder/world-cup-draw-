<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup Draw</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#08111f;color:#fff}
.wrap{max-width:1100px;margin:auto;padding:20px}
h1{text-align:center}
.controls,.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
select,button{padding:12px;border-radius:10px;border:0;font-size:16px}
button{cursor:pointer;font-weight:700}
.draw{background:#f5d27a;color:#222}
.auto{background:#d4aa4b;color:#222}
.reset{background:#444;color:#fff}
.stage,.board,.summary{background:#152238;border-radius:16px;padding:16px;margin-bottom:16px}
.big{font-size:40px;font-weight:900;text-align:center;margin:20px 0}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.card{background:#1d2d46;padding:12px;border-radius:12px}
.pill{display:inline-block;background:#2b4365;padding:6px 10px;border-radius:999px;margin:4px;font-size:14px}
.hide{display:none}
</style>
</head>
<body>
<div class="wrap">
<h1>World Cup 2026 Sweepstake Draw</h1>

<div class="controls">
<select id="player"></select>
<button class="draw" id="drawBtn">Draw Team</button>
<button class="auto" id="autoBtn">Auto Complete</button>
<button class="reset" id="resetBtn">Reset</button>
</div>

<div class="stats">
<div>Teams left: <strong id="left"></strong></div>
<div>Draws: <strong id="done"></strong></div>
</div>

<div class="stage">
<div>Now drawing for:</div>
<div class="big" id="currentPlayer">Andrew</div>
<div class="big" id="result">Press Draw Team</div>
</div>

<div class="board">
<h2>Draw Board</h2>
<div class="cards" id="board"></div>
</div>

<div class="summary hide" id="summary">
<h2>Final Results</h2>
<div class="cards" id="summaryBoard"></div>
</div>
</div>

<script>
const players=["Andrew","Ted","Stephen","Elaine","Joe","Joanne","Mads","Magaret","Russell","Mandy","Ava"];
const teams=[
"Canada","Mexico","USA","Algeria","Argentina","Australia","Austria","Belgium",
"Bosnia and Herzegovina","Brazil","Colombia","Congo DR","Côte d'Ivoire","Croatia",
"Czechia","Ecuador","Egypt","England","France","Germany","Ghana","IR Iran","Iraq",
"Japan","Jordan","Korea Republic","Morocco","Netherlands","Norway","Panama","Paraguay",
"Portugal","Qatar","Saudi Arabia","Scotland","Senegal","South Africa","Spain","Sweden",
"Switzerland","Tunisia","Türkiye","Uruguay","Uzbekistan"
];
const maxTeams=4;
let remaining=[...teams];
let assigned={};
players.forEach(p=>assigned[p]=[]);

const playerSel=document.getElementById("player");
const drawBtn=document.getElementById("drawBtn");
const autoBtn=document.getElementById("autoBtn");
const resetBtn=document.getElementById("resetBtn");
const left=document.getElementById("left");
const done=document.getElementById("done");
const currentPlayer=document.getElementById("currentPlayer");
const result=document.getElementById("result");
const board=document.getElementById("board");
const summary=document.getElementById("summary");
const summaryBoard=document.getElementById("summaryBoard");

players.forEach(p=>{
  const o=document.createElement("option");
  o.value=p;o.textContent=p;
  playerSel.appendChild(o);
});

function render(){
  left.textContent=remaining.length;
  done.textContent=(44-remaining.length)+" / 44";
  currentPlayer.textContent=playerSel.value;
  board.innerHTML="";
  summaryBoard.innerHTML="";
  players.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML="<h3>"+p+" ("+assigned[p].length+"/4)</h3>";
    assigned[p].forEach(t=>{
      const s=document.createElement("span");
      s.className="pill";
      s.textContent=t;
      card.appendChild(s);
    });
    for(let i=assigned[p].length;i<4;i++){
      const s=document.createElement("span");
      s.className="pill";
      s.textContent="Slot "+(i+1);
      card.appendChild(s);
    }
    board.appendChild(card);

    const card2=card.cloneNode(true);
    summaryBoard.appendChild(card2);
  });
  if(remaining.length===0) summary.classList.remove("hide");
}

function drawOne(p){
  if(assigned[p].length>=maxTeams||remaining.length===0)return;
  const i=Math.floor(Math.random()*remaining.length);
  const team=remaining.splice(i,1)[0];
  assigned[p].push(team);
  result.textContent=team;
  render();
}

async function autoComplete(){
  for(const p of players){
    while(assigned[p].length<maxTeams&&remaining.length>0){
      playerSel.value=p;
      currentPlayer.textContent=p;
      drawOne(p);
      await new Promise(r=>setTimeout(r,300));
    }
  }
}

function resetAll(){
  remaining=[...teams];
  assigned={};
  players.forEach(p=>assigned[p]=[]);
  playerSel.value=players[0];
  result.textContent="Press Draw Team";
  summary.classList.add("hide");
  render();
}

playerSel.addEventListener("change",()=>{currentPlayer.textContent=playerSel.value;});
drawBtn.addEventListener("click",()=>drawOne(playerSel.value));
autoBtn.addEventListener("click",autoComplete);
resetBtn.addEventListener("click",resetAll);

playerSel.value=players[0];
render();
</script>
</body>
</html>
